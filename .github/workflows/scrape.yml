name: Daily scrape

on:
  schedule:
    # Every day at 06:00 UTC. GitHub may delay scheduled runs under load.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Needed to commit the refreshed DuckDB file back to the repo.
permissions:
  contents: write

# Never let two scrapes run (or push) at once.
concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape
        env:
          # Default token: reads public repos at 1000 req/h (a full run makes ~600).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scrape.py --db community_extensions.duckdb

      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add community_extensions.duckdb
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily scrape $(date -u +%Y-%m-%d)"
            git push
          fi
